services:
  postgres:
    image: postgres:16
    container_name: svo_museum_db
    ports: 
      - "5432:5432"
    env_file:
      - ../../api/.env
    volumes:
      - postgres_data:/home/docker/postgres/data
      - ../postgres/postgres.conf:/etc/postgresql/postgresql.conf:ro
      - ../postgres/init-scripts:/docker-entrypoint-initdb.d:ro
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER:-postgres}" -d "$${POSTGRES_DB:-postgres}" -h localhost || exit 1' ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
  
volumes:
  postgres_data: